name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Tidy / Vet
        run: |
          go mod download
          go vet ./...

      - name: Test
        run: go test ./... -race -count=1

      - name: Build all entrypoints
        run: |
          mkdir -p bin
          for cmd in sonar-api sonar-poller sonar-probe; do
            CGO_ENABLED=0 go build -trimpath -o bin/$cmd ./cmd/$cmd
          done

  web:
    name: Web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build

  probe-matrix:
    name: Probe cross-compile
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { goos: windows, goarch: amd64, ext: ".exe" }
          - { goos: windows, goarch: arm64, ext: ".exe" }
          - { goos: linux,   goarch: amd64, ext: ""     }
          - { goos: linux,   goarch: arm64, ext: ""     }
          - { goos: darwin,  goarch: amd64, ext: ""     }
          - { goos: darwin,  goarch: arm64, ext: ""     }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="$(cat VERSION)"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          OUT="dist/sonar-probe-${VERSION}-${GOOS}-${GOARCH}${{ matrix.target.ext }}"
          mkdir -p dist
          go build -trimpath \
            -ldflags "-s -w \
              -X github.com/NCLGISA/ScanRay-Sonar/internal/version.Version=${VERSION} \
              -X github.com/NCLGISA/ScanRay-Sonar/internal/version.Commit=${COMMIT} \
              -X github.com/NCLGISA/ScanRay-Sonar/internal/version.BuildTime=${BUILD_TIME}" \
            -o "$OUT" ./cmd/sonar-probe
      - uses: actions/upload-artifact@v4
        with:
          name: sonar-probe-${{ matrix.target.goos }}-${{ matrix.target.goarch }}
          path: dist/*
