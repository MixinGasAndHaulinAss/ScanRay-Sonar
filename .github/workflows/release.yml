name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  images:
    name: Build & push container images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push sonar-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
            COMMIT=${{ steps.ver.outputs.commit }}
            BUILD_TIME=${{ steps.ver.outputs.build_time }}
          tags: |
            ghcr.io/nclgisa/scanray-sonar-api:${{ steps.ver.outputs.version }}
            ghcr.io/nclgisa/scanray-sonar-api:latest

      - name: Build & push sonar-poller
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/poller.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
            COMMIT=${{ steps.ver.outputs.commit }}
            BUILD_TIME=${{ steps.ver.outputs.build_time }}
          tags: |
            ghcr.io/nclgisa/scanray-sonar-poller:${{ steps.ver.outputs.version }}
            ghcr.io/nclgisa/scanray-sonar-poller:latest

  probes:
    name: Build & attach probe binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Cross-compile probes
        run: bash scripts/build-probe.sh
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/probe/*
          generate_release_notes: true
