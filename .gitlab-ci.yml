# =============================================================================
# .gitlab-ci.yml — ScanRay Sonar
#
# Pipeline shape (modeled on StrikeTeam/The-ScanRay-Console and
# StrikeTeam/ResponseRay sibling projects):
#
#   validate -> test -> build -> scan -> package -> sync
#
# Hard-gated: no allow_failure: true anywhere. Any stage failure halts
# the pipeline. HIGH/CRITICAL fixed CVEs (trivy fs + image, govulncheck)
# block deploys.
#
# Image cache: every `image:` and `services: -name:` reference uses the
# StrikeTeam group's GitLab Dependency Proxy via
# ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX} so runner-side pulls hit
# the LAN cache (90-day TTL) instead of Docker Hub.
#
# FORCE_RUN_ALL=true on a manually-triggered pipeline runs every
# per-component job regardless of changed paths. Use after a base-image
# bump or security advisory to guarantee the "secure baseline" — every
# check fired, every image rebuilt fresh.
# =============================================================================

stages:
  - validate
  - test
  - build
  - scan
  - package
  - sync

# Every job runs on the StrikeTeam Linux+Docker shared runner unless it
# overrides `tags:` explicitly. The instance runners on gitlab.nclgisa.org
# all have `run_untagged = false`, so omitting tags would leave jobs
# sitting in `pending` forever — every sibling project in the group
# matches this convention.
default:
  tags:
    - linuxrunner

variables:
  # Two GLCR images get published:
  #   ${REGISTRY}/${IMAGE_PREFIX}/api
  #   ${REGISTRY}/${IMAGE_PREFIX}/poller
  REGISTRY: glcr.nclgisa.org:443
  IMAGE_PREFIX: striketeam/scanray-sonar
  # Pin Go and Node toolchain images. Bump in lockstep with go.mod's
  # `go` directive when you bring in a dep that needs a newer compiler.
  GO_IMAGE: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/library/golang:1.25-bookworm
  NODE_IMAGE: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/library/node:20-bookworm
  ALPINE_IMAGE: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/library/alpine:3.21
  HADOLINT_IMAGE: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/hadolint/hadolint:latest-alpine
  GITLEAKS_IMAGE: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/zricethezav/gitleaks:latest
  TRIVY_IMAGE: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/aquasec/trivy:latest
  # The dep-proxy has been flaky for `docker`/`docker:dind` (JWT-auth
  # timeouts during prepare_executor when its upstream cache misses).
  # Pull these two directly from Docker Hub — small, frequently-cached
  # images that don't benefit much from proxying anyway. Other images
  # (Go, Node, Trivy, etc.) stay on the dep-proxy.
  DOCKER_IMAGE: docker:27
  DIND_IMAGE: docker:27-dind
  # Speed up `go test` and module downloads by caching modules in a
  # job-scoped path that's also the GOPATH so artifacts stay coherent.
  GOPATH: ${CI_PROJECT_DIR}/.gocache
  GOMODCACHE: ${CI_PROJECT_DIR}/.gocache/pkg/mod
  GOLANGCI_LINT_CACHE: ${CI_PROJECT_DIR}/.golangci-cache

# ---------------------------------------------------------------------------
# Reusable rule blocks. Stage entry conditions live here so a single
# edit propagates to every job that opts in via `!reference`.
# ---------------------------------------------------------------------------

.rules-always: &rules-always
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

.rules-master: &rules-master
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

.rules-tag: &rules-tag
  rules:
    - if: '$CI_COMMIT_TAG'

# Per-component path filters. Every per-service job opts in via
# `!reference [.rules-api, rules]` (or `.rules-poller`). The
# FORCE_RUN_ALL=true short-circuit MUST come first so manual operator
# triggers always fire every job.
.rules-api:
  rules:
    - if: '$FORCE_RUN_ALL == "true"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - cmd/sonar-api/**/*
        - cmd/sonar-probe/**/*
        - internal/api/**/*
        - internal/auth/**/*
        - internal/crypto/**/*
        - internal/db/**/*
        - internal/geoip/**/*
        - internal/logging/**/*
        - internal/probe/**/*
        - internal/probebins/**/*
        - internal/version/**/*
        - web/**/*
        - docker/api.Dockerfile
        - go.mod
        - go.sum
        - .gitlab-ci.yml
        - ci/smart_build.sh
    - if: '$CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - cmd/sonar-api/**/*
        - cmd/sonar-probe/**/*
        - internal/api/**/*
        - internal/auth/**/*
        - internal/crypto/**/*
        - internal/db/**/*
        - internal/geoip/**/*
        - internal/logging/**/*
        - internal/probe/**/*
        - internal/probebins/**/*
        - internal/version/**/*
        - web/**/*
        - docker/api.Dockerfile
        - go.mod
        - go.sum
        - .gitlab-ci.yml
        - ci/smart_build.sh

.rules-poller:
  rules:
    - if: '$FORCE_RUN_ALL == "true"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - cmd/sonar-poller/**/*
        - internal/poller/**/*
        - internal/snmp/**/*
        - internal/auth/**/*
        - internal/config/**/*
        - internal/crypto/**/*
        - internal/db/**/*
        - internal/logging/**/*
        - internal/version/**/*
        - docker/poller.Dockerfile
        - go.mod
        - go.sum
        - .gitlab-ci.yml
        - ci/smart_build.sh
    - if: '$CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - cmd/sonar-poller/**/*
        - internal/poller/**/*
        - internal/snmp/**/*
        - internal/auth/**/*
        - internal/config/**/*
        - internal/crypto/**/*
        - internal/db/**/*
        - internal/logging/**/*
        - internal/version/**/*
        - docker/poller.Dockerfile
        - go.mod
        - go.sum
        - .gitlab-ci.yml
        - ci/smart_build.sh

.rules-collector:
  rules:
    - if: '$FORCE_RUN_ALL == "true"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - cmd/sonar-collector/**/*
        - cmd/sonar-collector-winagent/**/*
        - internal/collector/**/*
        - cmd/sonar-poller/**/*
        - internal/poller/**/*
        - internal/snmp/**/*
        - internal/auth/**/*
        - internal/config/**/*
        - internal/crypto/**/*
        - internal/db/**/*
        - internal/logging/**/*
        - internal/version/**/*
        - docker/collector.Dockerfile
        - go.mod
        - go.sum
        - .gitlab-ci.yml
        - ci/smart_build.sh
    - if: '$CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - cmd/sonar-collector/**/*
        - cmd/sonar-collector-winagent/**/*
        - internal/collector/**/*
        - cmd/sonar-poller/**/*
        - internal/poller/**/*
        - internal/snmp/**/*
        - internal/auth/**/*
        - internal/config/**/*
        - internal/crypto/**/*
        - internal/db/**/*
        - internal/logging/**/*
        - internal/version/**/*
        - docker/collector.Dockerfile
        - go.mod
        - go.sum
        - .gitlab-ci.yml
        - ci/smart_build.sh

# ---------------------------------------------------------------------------
# DinD docker job template. The dependency-proxy'd dind image does NOT
# auto-alias as `docker`, so we set it explicitly — without this,
# DOCKER_HOST=tcp://docker:2375 fails with "no such host" (gotcha
# documented in the responseray-deployment skill).
# ---------------------------------------------------------------------------

.docker-job:
  image: $DOCKER_IMAGE
  services:
    - name: $DIND_IMAGE
      alias: docker
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  # Auto-recover from transient failures pulling the docker:27/dind
  # images from the GitLab dependency proxy (we've seen JWT-auth
  # timeouts during prepare_executor under registry load).
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - scheduler_failure
      - api_failure
  before_script:
    # The official `docker:27` image is Alpine-based and ships with
    # busybox `sh` only. `ci/smart_build.sh` uses bash-isms ([[, etc.)
    # and calls `git diff` for the smart-build retag chain, so install
    # both up-front. `--no-cache` keeps the layer ephemeral.
    - apk add --no-cache bash git
    # Authenticate to GLCR using the per-job CI registry credentials
    # (provided automatically by GitLab when Container Registry is
    # enabled on this project).
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
    # Optional: Docker Hub auth to dodge anonymous-pull rate limits.
    # The `|| true` keeps the job from failing when these vars aren't
    # configured yet (e.g. on first pipeline before operator sets them).
    - >
      if [ -n "${DOCKERHUB_USER:-}" ] && [ -n "${DOCKERHUB_TOKEN:-}" ]; then
        echo "$DOCKERHUB_TOKEN" | docker login docker.io -u "$DOCKERHUB_USER" --password-stdin || true;
      fi

# ===========================================================================
# Stage 1: validate
# ===========================================================================

lint:go:
  stage: validate
  image: $GO_IMAGE
  <<: *rules-always
  cache:
    key: go-mod-${CI_COMMIT_REF_SLUG}
    paths: [.gocache/]
  script:
    - go version
    # Whitelist first-party directories. The cache path `.gocache/`
    # holds downloaded module dependencies and is not ours to reformat;
    # without scoping, `gofmt -l .` (correctly but uselessly) flags
    # upstream files once the cache populates.
    - gofmt -l cmd/ internal/ | tee /tmp/gofmt.out
    - test ! -s /tmp/gofmt.out || (echo "gofmt -s violations above" && exit 1)
    - go vet ./...

lint:web:
  stage: validate
  image: $NODE_IMAGE
  <<: *rules-always
  cache:
    key: npm-${CI_COMMIT_REF_SLUG}
    paths: [web/node_modules/]
  script:
    - cd web
    - npm ci --no-audit --no-fund || npm install --no-audit --no-fund
    - npm run lint

lint:dockerfiles:
  stage: validate
  image: $HADOLINT_IMAGE
  <<: *rules-always
  script:
    # Hadolint reads .hadolint.yaml from the repo root automatically.
    - hadolint docker/api.Dockerfile docker/poller.Dockerfile docker/collector.Dockerfile docker/probe.Dockerfile

secrets-scan:
  stage: validate
  image:
    name: $GITLEAKS_IMAGE
    entrypoint: [""]
  <<: *rules-always
  script:
    # `--redact` keeps any matched secret fragment out of the visible
    # job log; the unredacted JSON is uploaded as an artifact for
    # operator triage.
    - gitleaks detect --source . --config .gitleaks.toml --redact --report-format json --report-path gitleaks-report.json --exit-code 1
  artifacts:
    when: always
    paths: [gitleaks-report.json]
    expire_in: 30 days

vuln-scan-fs:
  stage: validate
  image:
    name: $TRIVY_IMAGE
    entrypoint: [""]
  <<: *rules-always
  script:
    - trivy --version
    # Filesystem scan: --ignore-unfixed avoids noise from upstreams that
    # haven't shipped a patch yet, --exit-code 1 makes HIGH/CRITICAL
    # findings fail the job.
    - >
      trivy fs
      --ignore-unfixed
      --severity HIGH,CRITICAL
      --exit-code 1
      --no-progress
      --skip-dirs web/node_modules
      --skip-dirs .gocache
      --format table
      .

# ===========================================================================
# Stage 2: test
# ===========================================================================

test:go:
  stage: test
  image: $GO_IMAGE
  needs: ["lint:go"]
  <<: *rules-always
  cache:
    key: go-mod-${CI_COMMIT_REF_SLUG}
    paths: [.gocache/]
  script:
    - go test ./... -race -count=1

# Cross-OS go vet — ensures windows-only and darwin-only build-tagged
# files compile against the rest of the tree without needing actual
# Windows / macOS runners.
test:probe-windows:
  stage: test
  image: $GO_IMAGE
  needs: ["lint:go"]
  <<: *rules-always
  cache:
    key: go-mod-${CI_COMMIT_REF_SLUG}
    paths: [.gocache/]
  variables:
    GOOS: windows
    GOARCH: amd64
    CGO_ENABLED: "0"
  script:
    # `-unsafeptr=false` because internal/probe/sessions_windows.go
    # has legitimate `unsafe.Pointer(uintptr)` and `unsafe.Add`
    # patterns that cross the Windows-API boundary (WTSEnumerateSessionsExW
    # buffer slicing, FILETIME pointer arithmetic). The Windows native
    # build itself catches real bugs; vet's heuristic flags these as
    # potential misuse on every cross-OS lint run.
    - go vet -unsafeptr=false ./...
    - go build -o /dev/null ./cmd/sonar-probe

test:probe-darwin:
  stage: test
  image: $GO_IMAGE
  needs: ["lint:go"]
  <<: *rules-always
  cache:
    key: go-mod-${CI_COMMIT_REF_SLUG}
    paths: [.gocache/]
  variables:
    GOOS: darwin
    GOARCH: arm64
    CGO_ENABLED: "0"
  script:
    - go vet ./...
    - go build -o /dev/null ./cmd/sonar-probe

test:web:
  stage: test
  image: $NODE_IMAGE
  needs: ["lint:web"]
  <<: *rules-always
  cache:
    key: npm-${CI_COMMIT_REF_SLUG}
    paths: [web/node_modules/]
  script:
    - cd web
    - npm ci --no-audit --no-fund || npm install --no-audit --no-fund
    - npm run build
  artifacts:
    paths: [web/dist/]
    expire_in: 1 week

# Reachable-CVE scan (govulncheck looks at actual call graphs, not just
# go.mod versions, so it has a much lower false-positive rate than
# trivy fs). Needs Go ≥1.22 to install.
vuln-scan:govulncheck:
  stage: test
  image: $GO_IMAGE
  needs: ["lint:go"]
  <<: *rules-always
  cache:
    key: go-mod-${CI_COMMIT_REF_SLUG}
    paths: [.gocache/]
  script:
    - go install golang.org/x/vuln/cmd/govulncheck@latest
    - $GOPATH/bin/govulncheck ./...

# ===========================================================================
# Stage 3: build
#
# smart_build.sh decides per-service whether to do a real `docker build`
# or just retag the previous SHA's image as the new SHA. Both produce
# the same `:$CI_COMMIT_SHORT_SHA` tag in GLCR so downstream stages
# don't care which path was taken.
# ===========================================================================

build:api:
  stage: build
  extends: .docker-job
  needs: ["test:go", "test:web", "vuln-scan-fs", "secrets-scan", "lint:dockerfiles", "vuln-scan:govulncheck"]
  rules: !reference [.rules-api, rules]
  script:
    - chmod +x ci/smart_build.sh
    - >
      ./ci/smart_build.sh api docker/api.Dockerfile
      "cmd/sonar-api/ cmd/sonar-probe/ internal/api/ internal/auth/ internal/crypto/ internal/db/ internal/geoip/ internal/logging/ internal/probe/ internal/probebins/ internal/version/ web/ docker/api.Dockerfile go.mod go.sum"

build:poller:
  stage: build
  extends: .docker-job
  needs: ["test:go", "vuln-scan-fs", "secrets-scan", "lint:dockerfiles", "vuln-scan:govulncheck"]
  rules: !reference [.rules-poller, rules]
  script:
    - chmod +x ci/smart_build.sh
    - >
      ./ci/smart_build.sh poller docker/poller.Dockerfile
      "cmd/sonar-poller/ internal/poller/ internal/snmp/ internal/auth/ internal/config/ internal/crypto/ internal/db/ internal/logging/ internal/version/ docker/poller.Dockerfile go.mod go.sum"

build:collector:
  stage: build
  extends: .docker-job
  needs: ["test:go", "vuln-scan-fs", "secrets-scan", "lint:dockerfiles", "vuln-scan:govulncheck"]
  rules: !reference [.rules-collector, rules]
  script:
    - chmod +x ci/smart_build.sh
    - >
      ./ci/smart_build.sh collector docker/collector.Dockerfile
      "cmd/sonar-collector/ cmd/sonar-collector-winagent/ internal/collector/ internal/poller/ internal/snmp/ internal/auth/ internal/config/ internal/crypto/ internal/db/ internal/logging/ internal/version/ docker/collector.Dockerfile go.mod go.sum"

build:winagent:
  stage: build
  image: $GO_IMAGE
  needs: ["test:go"]
  rules: !reference [.rules-collector, rules]
  script:
    - mkdir -p artifacts
    - GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -o artifacts/sonar-collector-winagent.exe ./cmd/sonar-collector-winagent
  artifacts:
    paths:
      - artifacts/sonar-collector-winagent.exe

# ===========================================================================
# Stage 4: scan (re-scan the actually-pushed images)
# ===========================================================================

# Trivy scan is split per-service so it inherits the same per-component
# rules as `build:*`. Otherwise, when `build:poller` is skipped by
# smart-build (e.g. a web-only change), the merged scan job would try
# to pull a poller SHA tag that was never pushed and fail with
# MANIFEST_UNKNOWN. Same logic applies to `package:*` below.
.scan-job:
  stage: scan
  image:
    name: $TRIVY_IMAGE
    entrypoint: [""]
  variables:
    TRIVY_USERNAME: $CI_REGISTRY_USER
    TRIVY_PASSWORD: $CI_REGISTRY_PASSWORD
  script:
    - trivy --version
    - >
      trivy image
      --ignore-unfixed
      --severity HIGH,CRITICAL
      --exit-code 1
      --no-progress
      --format table
      "${REGISTRY}/${IMAGE_PREFIX}/${SERVICE}:${CI_COMMIT_SHORT_SHA}"

scan:trivy-api:
  extends: .scan-job
  rules: !reference [.rules-api, rules]
  needs: ["build:api"]
  variables:
    SERVICE: api

scan:trivy-poller:
  extends: .scan-job
  rules: !reference [.rules-poller, rules]
  needs: ["build:poller"]
  variables:
    SERVICE: poller

scan:trivy-collector:
  extends: .scan-job
  rules: !reference [.rules-collector, rules]
  needs: ["build:collector"]
  variables:
    SERVICE: collector

# ===========================================================================
# Stage 5: package — alias the SHA-tagged image as :latest, :VERSION,
# and (on tag pipelines) :CI_COMMIT_TAG so deployments can pin to any
# of those references.
# ===========================================================================

.package-job:
  stage: package
  extends: .docker-job
  # Per-service rules are applied on the concrete jobs below
  # (package:api uses .rules-api, package:poller uses .rules-poller)
  # so that a smart-skipped build also smart-skips its package step.
  script:
    - VERSION="$(cat VERSION | tr -d '[:space:]')"
    - SRC="${REGISTRY}/${IMAGE_PREFIX}/${SERVICE}:${CI_COMMIT_SHORT_SHA}"
    - docker pull "$SRC"
    - docker tag "$SRC" "${REGISTRY}/${IMAGE_PREFIX}/${SERVICE}:latest"
    - docker push "${REGISTRY}/${IMAGE_PREFIX}/${SERVICE}:latest"
    - >
      if [ -n "$VERSION" ]; then
        docker tag "$SRC" "${REGISTRY}/${IMAGE_PREFIX}/${SERVICE}:${VERSION}";
        docker push "${REGISTRY}/${IMAGE_PREFIX}/${SERVICE}:${VERSION}";
      fi
    - >
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        docker tag "$SRC" "${REGISTRY}/${IMAGE_PREFIX}/${SERVICE}:${CI_COMMIT_TAG}";
        docker push "${REGISTRY}/${IMAGE_PREFIX}/${SERVICE}:${CI_COMMIT_TAG}";
      fi

package:api:
  extends: .package-job
  rules: !reference [.rules-api, rules]
  needs: ["scan:trivy-api"]
  variables:
    SERVICE: api

package:poller:
  extends: .package-job
  rules: !reference [.rules-poller, rules]
  needs: ["scan:trivy-poller"]
  variables:
    SERVICE: poller

package:collector:
  extends: .package-job
  rules: !reference [.rules-collector, rules]
  needs: ["scan:trivy-collector"]
  variables:
    SERVICE: collector

# ===========================================================================
# Stage 6: sync — one-way mirror to GitHub
# ===========================================================================

mirror:github:
  stage: sync
  image: $ALPINE_IMAGE
  <<: *rules-master
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  before_script:
    - apk add --no-cache git openssh-client
  script:
    - >
      if [ -z "${GITHUB_MIRROR_TOKEN:-}" ]; then
        echo "GITHUB_MIRROR_TOKEN not set — skipping mirror";
        exit 0;
      fi
    # Username must be any non-empty string; GitHub fine-grained PATs
    # authenticate via the token-as-password. `x-access-token` only
    # works for GitHub App installation tokens, not PATs, so we use
    # the account name here instead.
    - git remote add github "https://MixinGasAndHaulinAss:${GITHUB_MIRROR_TOKEN}@github.com/MixinGasAndHaulinAss/ScanRay-Sonar.git"
    # Push to the same ref name we're running on (CI_COMMIT_REF_NAME=main
    # for our default branch). Hardcoding `master` was a leftover from
    # the sibling-project template.
    - git push github "HEAD:refs/heads/${CI_COMMIT_REF_NAME}"
    - >
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        git push github "${CI_COMMIT_TAG}";
      fi
