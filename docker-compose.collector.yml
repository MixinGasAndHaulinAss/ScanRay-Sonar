# Remote-site ScanRay Sonar collector — enroll once, then `run`.
#
# Default image matches the Collectors UI / API default (GLCR). Override
# SONAR_VERSION or use SONAR_COLLECTOR_IMAGE on central Sonar for mirrors.
#
#   docker run --rm --network host \
#     -e SONAR_MASTER_KEY=<same-as-central> \
#     -v sonar-collector-config:/etc/sonar \
#     glcr.nclgisa.org:443/striketeam/scanray-sonar/collector:latest \
#     enroll --token=... --base=https://sonar.example.com --name=site-a
#
#   docker run -d --name sonar-collector --restart unless-stopped \
#     --network host --cap-add NET_RAW \
#     -e SONAR_MASTER_KEY=<same-as-central> \
#     -v sonar-collector-config:/etc/sonar \
#     glcr.nclgisa.org:443/striketeam/scanray-sonar/collector:latest run
#
# Prefer the install commands from the Collectors UI — they include your
# token, base URL, and the image this deployment advertises.
#
name: sonar-collector-remote

services:
  sonar-collector:
    image: glcr.nclgisa.org:443/striketeam/scanray-sonar/collector:${SONAR_VERSION:-latest}
    restart: unless-stopped
    # network_mode: host + CAP_NET_RAW are required by the passive
    # SNMP discovery feature, which opens a raw AF_PACKET socket on
    # the local NIC to capture UDP/161 destinations from upstream
    # monitoring traffic. If passive discovery is disabled in the
    # site settings this container will still log a one-time
    # "permission denied" if neither flag is set; flip them off to
    # silence it on tightly-locked-down hosts that don't run passive
    # discovery.
    network_mode: host
    cap_add:
      - NET_RAW
    volumes:
      - collector-config:/etc/sonar
    environment:
      SONAR_COLLECTOR_CONFIG: /etc/sonar/collector.json
      SONAR_MASTER_KEY: ${SONAR_MASTER_KEY:?set SONAR_MASTER_KEY same as central Sonar}
    command: ["run"]

volumes:
  collector-config:
