# =============================================================================
# docker-compose.registry.yml — active GLCR pull-only deploy overlay.
#
# Replaces the `build:` keys on sonar-api and sonar-poller with `image:`
# references to StrikeTeam GLCR images:
#
#   glcr.nclgisa.org:443/striketeam/scanray-sonar/api:<tag>
#   glcr.nclgisa.org:443/striketeam/scanray-sonar/poller:<tag>
#
# Canonical deploy on lab hosts:
#
#   ./scripts/deploy-registry.sh
#
# Manual equivalent:
#
#   docker compose -f docker-compose.yml -f docker-compose.registry.yml \
#     [-f docker-compose.dev-collector.yml] pull
#   docker compose -f docker-compose.yml -f docker-compose.registry.yml \
#     [-f docker-compose.dev-collector.yml] up -d --pull always --force-recreate
#
# IMAGE_TAG selects the GLCR tag for api + poller (and collector when the
# dev-collector overlay is included). Keep them uniform.
# `scripts/deploy-registry.sh` defaults IMAGE_TAG to `latest` unless already
# set in the shell or `.env`. Pin with IMAGE_TAG=<CalVer|SHA> for rollback.
# =============================================================================

services:
  sonar-api:
    image: glcr.nclgisa.org:443/striketeam/scanray-sonar/api:${IMAGE_TAG:-latest}
    # Wipe the build: stanza from docker-compose.yml so `docker compose
    # pull` doesn't try to rebuild from source. `!reset` is the compose
    # spec's idiom for "ignore the value from a lower-precedence file."
    build: !reset null

  sonar-poller:
    image: glcr.nclgisa.org:443/striketeam/scanray-sonar/poller:${IMAGE_TAG:-latest}
    build: !reset null
