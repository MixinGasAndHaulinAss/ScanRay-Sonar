# =============================================================================
# ScanRay Sonar — Docker Compose stack
#
# Port policy:
#   * sonar-api publishes ${SONAR_API_BIND:-0.0.0.0}:${SONAR_API_PORT:-6969}
#     -> 8080 inside the container. The default of 0.0.0.0:6969 makes
#     the UI reachable from anywhere on the LAN (admin password + JWT
#     are still required). For Cloudflare Tunnel deployments, set
#     SONAR_API_BIND=127.0.0.1 in .env so only the host's cloudflared
#     can reach it. Port 8080 is intentionally avoided because it is
#     taken by an unrelated service on the dev host.
#   * sonar-postgres and sonar-nats do NOT publish to the host. They are
#     reachable only on the internal `scanraysonar_default` docker
#     network. This avoids host port collisions and shrinks the attack
#     surface.
# =============================================================================

name: scanraysonar

# Every stack container carries com.scanraysonar.release so operators see one CalVer string in
# `docker inspect` / compatible tooling. `scripts/deploy-registry.sh` exports SCANRAY_STACK_VERSION
# from VERSION after git pull; build-only hosts may omit it (defaults to label value `unknown`).

services:
  sonar-postgres:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: sonar-postgres
    restart: unless-stopped
    labels:
      com.scanraysonar.release: "${SCANRAY_STACK_VERSION:-unknown}"
    environment:
      POSTGRES_DB: ${SONAR_DB_NAME:-sonar}
      POSTGRES_USER: ${SONAR_DB_USER:-sonar}
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD:?SONAR_DB_PASSWORD must be set in .env}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - sonar-pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SONAR_DB_USER:-sonar} -d ${SONAR_DB_NAME:-sonar}"]
      interval: 10s
      timeout: 5s
      retries: 6

  sonar-nats:
    image: nats:2.10-alpine
    container_name: sonar-nats
    restart: unless-stopped
    labels:
      com.scanraysonar.release: "${SCANRAY_STACK_VERSION:-unknown}"
    command:
      - "-js"
      - "-sd"
      - "/data"
      - "-m"
      - "8222"
    volumes:
      - sonar-natsdata:/data
    expose:
      - "4222"
      - "8222"

  sonar-api:
    image: ghcr.io/nclgisa/scanray-sonar-api:${SONAR_VERSION:-latest}
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      # Use the host network during build so corporate proxies / DNS
      # work the same way they do for the host. Combined with the
      # optional CA injection in docker/local-ca.crt, this lets the
      # build succeed on hosts behind TLS-inspecting firewalls.
      network: host
      args:
        # Default empty so the Dockerfile falls back to reading the
        # top-level VERSION file (single source of truth). Override
        # SONAR_VERSION in CI to pin the binary's reported version.
        VERSION: ${SONAR_VERSION-}
    container_name: sonar-api
    restart: unless-stopped
    labels:
      com.scanraysonar.release: "${SCANRAY_STACK_VERSION:-unknown}"
    depends_on:
      sonar-postgres:
        condition: service_healthy
      sonar-nats:
        condition: service_started
    env_file: .env
    environment:
      SONAR_BIND_ADDR: 0.0.0.0:8080
      SONAR_DB_HOST: sonar-postgres
      SONAR_NATS_URL: nats://sonar-nats:4222
    ports:
      - "${SONAR_API_BIND:-0.0.0.0}:${SONAR_API_PORT:-6969}:8080"
    volumes:
      # MaxMind GeoLite2 databases. The API mounts them read-only at a
      # fixed path; scripts/refresh-geoip.sh writes the files into the
      # named volume from a privileged refresh job (cron / Makefile).
      - sonar-geoip:/var/lib/sonar/geoip:ro
    # No container-level healthcheck: distroless has no shell/curl. The
    # /api/v1/healthz endpoint is exposed for upstream (Cloudflare /
    # external monitoring) probes.

  sonar-poller:
    image: ghcr.io/nclgisa/scanray-sonar-poller:${SONAR_VERSION:-latest}
    build:
      context: .
      dockerfile: docker/poller.Dockerfile
      network: host
      args:
        VERSION: ${SONAR_VERSION-}
    container_name: sonar-poller
    restart: unless-stopped
    labels:
      com.scanraysonar.release: "${SCANRAY_STACK_VERSION:-unknown}"
    depends_on:
      sonar-postgres:
        condition: service_healthy
      sonar-nats:
        condition: service_started
    env_file: .env
    environment:
      SONAR_DB_HOST: sonar-postgres
      SONAR_NATS_URL: nats://sonar-nats:4222

  sonar-minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: sonar-minio
    restart: unless-stopped
    labels:
      com.scanraysonar.release: "${SCANRAY_STACK_VERSION:-unknown}"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${SONAR_MINIO_USER:-minio}
      MINIO_ROOT_PASSWORD: ${SONAR_MINIO_PASSWORD:-changeme_minio_root}
    expose:
      - "9000"
      - "9001"
    volumes:
      - sonar-minio-data:/data

volumes:
  sonar-pgdata:
    name: sonar-pgdata
  sonar-natsdata:
    name: sonar-natsdata
  sonar-geoip:
    name: sonar-geoip
  sonar-minio-data:
    name: sonar-minio-data
