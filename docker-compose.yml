# =============================================================================
# ScanRay Sonar — Docker Compose stack
#
# Port policy:
#   * sonar-api publishes ${SONAR_API_BIND:-0.0.0.0}:${SONAR_API_PORT:-6969}
#     -> 8080 inside the container. The default of 0.0.0.0:6969 makes
#     the UI reachable from anywhere on the LAN (admin password + JWT
#     are still required). For Cloudflare Tunnel deployments, set
#     SONAR_API_BIND=127.0.0.1 in .env so only the host's cloudflared
#     can reach it. Port 8080 is intentionally avoided because it is
#     taken by an unrelated service on the dev host.
#   * sonar-postgres and sonar-nats do NOT publish to the host. They are
#     reachable only on the internal `scanraysonar_default` docker
#     network. This avoids host port collisions and shrinks the attack
#     surface.
# =============================================================================

name: scanraysonar

services:
  sonar-postgres:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: sonar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SONAR_DB_NAME:-sonar}
      POSTGRES_USER: ${SONAR_DB_USER:-sonar}
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD:?SONAR_DB_PASSWORD must be set in .env}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - sonar-pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SONAR_DB_USER:-sonar} -d ${SONAR_DB_NAME:-sonar}"]
      interval: 10s
      timeout: 5s
      retries: 6

  sonar-nats:
    image: nats:2.10-alpine
    container_name: sonar-nats
    restart: unless-stopped
    command:
      - "-js"
      - "-sd"
      - "/data"
      - "-m"
      - "8222"
    volumes:
      - sonar-natsdata:/data
    expose:
      - "4222"
      - "8222"

  sonar-api:
    image: ghcr.io/nclgisa/scanray-sonar-api:${SONAR_VERSION:-latest}
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      # Use the host network during build so corporate proxies / DNS
      # work the same way they do for the host. Combined with the
      # optional CA injection in docker/local-ca.crt, this lets the
      # build succeed on hosts behind TLS-inspecting firewalls.
      network: host
      args:
        VERSION: ${SONAR_VERSION:-dev}
    container_name: sonar-api
    restart: unless-stopped
    depends_on:
      sonar-postgres:
        condition: service_healthy
      sonar-nats:
        condition: service_started
    env_file: .env
    environment:
      SONAR_BIND_ADDR: 0.0.0.0:8080
      SONAR_DB_HOST: sonar-postgres
      SONAR_NATS_URL: nats://sonar-nats:4222
    ports:
      - "${SONAR_API_BIND:-0.0.0.0}:${SONAR_API_PORT:-6969}:8080"
    # No container-level healthcheck: distroless has no shell/curl. The
    # /api/v1/healthz endpoint is exposed for upstream (Cloudflare /
    # external monitoring) probes.

  sonar-poller:
    image: ghcr.io/nclgisa/scanray-sonar-poller:${SONAR_VERSION:-latest}
    build:
      context: .
      dockerfile: docker/poller.Dockerfile
      network: host
      args:
        VERSION: ${SONAR_VERSION:-dev}
    container_name: sonar-poller
    restart: unless-stopped
    depends_on:
      sonar-postgres:
        condition: service_healthy
      sonar-nats:
        condition: service_started
    env_file: .env
    environment:
      SONAR_DB_HOST: sonar-postgres
      SONAR_NATS_URL: nats://sonar-nats:4222

volumes:
  sonar-pgdata:
    name: sonar-pgdata
  sonar-natsdata:
    name: sonar-natsdata
