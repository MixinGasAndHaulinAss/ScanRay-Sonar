openapi: 3.1.0
info:
  title: ScanRay Sonar API
  description: |
    Single-pane-of-visibility API for the ScanRay Sonar platform.
    Phase 1 surface: authentication, sites, users, agents, appliances,
    plus health and version endpoints.

    All non-auth endpoints require `Authorization: Bearer <jwt>`.
    Mutating endpoints additionally require RBAC role >= the level
    documented per-operation.
  version: "2026.4.26.5"
  license:
    name: MIT
servers:
  - url: /api/v1
    description: Versioned API root

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------
security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ---- Reusable schemas -------------------------------------------------
  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string, examples: ["unauthorized"] }
        message: { type: string }
        details: { type: object, additionalProperties: true }

    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [ok, degraded, down] }
        checks:
          type: object
          additionalProperties:
            type: object
            properties:
              ok: { type: boolean }
              detail: { type: string }

    VersionInfo:
      type: object
      required: [version, commit, buildTime, goVersion]
      properties:
        version: { type: string }
        commit: { type: string }
        buildTime: { type: string }
        goVersion: { type: string }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }
        totp: { type: string, description: "Required if MFA enrolled" }

    LoginResponse:
      type: object
      required: [accessToken, refreshToken, expiresAt, user]
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        expiresAt: { type: string, format: date-time }
        mfaRequired: { type: boolean, default: false }
        user: { $ref: "#/components/schemas/User" }

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string }

    User:
      type: object
      required: [id, email, displayName, role, totpEnrolled, isActive, createdAt]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName: { type: string }
        role: { type: string, enum: [superadmin, siteadmin, tech, readonly] }
        totpEnrolled: { type: boolean }
        isActive: { type: boolean }
        lastLoginAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }

    CreateUserRequest:
      type: object
      required: [email, displayName, password, role]
      properties:
        email: { type: string, format: email }
        displayName: { type: string }
        password: { type: string, format: password, minLength: 12 }
        role: { type: string, enum: [superadmin, siteadmin, tech, readonly] }

    UpdateUserRequest:
      type: object
      properties:
        displayName: { type: string }
        role: { type: string, enum: [superadmin, siteadmin, tech, readonly] }
        isActive: { type: boolean }
        password: { type: string, format: password, minLength: 12 }

    Site:
      type: object
      required: [id, slug, name, timezone, createdAt]
      properties:
        id: { type: string, format: uuid }
        slug: { type: string, pattern: "^[a-z0-9-]+$" }
        name: { type: string }
        timezone: { type: string }
        description: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    CreateSiteRequest:
      type: object
      required: [slug, name]
      properties:
        slug: { type: string, pattern: "^[a-z0-9-]+$" }
        name: { type: string }
        timezone: { type: string, default: "UTC" }
        description: { type: string }

    Agent:
      type: object
      required: [id, siteId, hostname, os, isActive, createdAt]
      properties:
        id: { type: string, format: uuid }
        siteId: { type: string, format: uuid }
        hostname: { type: string }
        fingerprint: { type: string, nullable: true }
        os: { type: string }
        osVersion: { type: string }
        agentVersion: { type: string }
        enrolledAt: { type: string, format: date-time, nullable: true }
        lastSeenAt: { type: string, format: date-time, nullable: true }
        isActive: { type: boolean }
        tags:
          type: array
          items: { type: string }
        createdAt: { type: string, format: date-time }

    Appliance:
      type: object
      required: [id, siteId, name, vendor, mgmtIp, snmpVersion, pollIntervalSeconds, isActive, createdAt]
      properties:
        id: { type: string, format: uuid }
        siteId: { type: string, format: uuid }
        name: { type: string }
        vendor: { type: string, enum: [meraki, cisco, aruba, ubiquiti, mikrotik, generic] }
        model: { type: string, nullable: true }
        serial: { type: string, nullable: true }
        mgmtIp: { type: string, format: ipv4 }
        snmpVersion: { type: string, enum: [v1, v2c, v3] }
        pollIntervalSeconds: { type: integer, minimum: 10, maximum: 3600 }
        isActive: { type: boolean }
        tags:
          type: array
          items: { type: string }
        lastPolledAt: { type: string, format: date-time, nullable: true }
        lastError: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        # Headline telemetry from the most recent poll. All nullable until
        # the poller's first cycle for a freshly-added appliance.
        sysName: { type: string, nullable: true }
        uptimeSeconds: { type: integer, format: int64, nullable: true }
        cpuPct: { type: number, format: float, nullable: true }
        memUsedBytes: { type: integer, format: int64, nullable: true }
        memTotalBytes: { type: integer, format: int64, nullable: true }
        ifUpCount: { type: integer, nullable: true }
        ifTotalCount: { type: integer, nullable: true }
        # Physical-only counts: total ifTable can include SVIs, port-channels,
        # loopbacks etc. that aren't really "ports" to an operator. The poller
        # classifies each interface (kind="physical"|"vlan"|"loopback"|"lag"|...) and
        # rolls up the physical counts here so list views can show "24 physical
        # (22 up)" instead of "113".
        physTotalCount: { type: integer, nullable: true }
        physUpCount: { type: integer, nullable: true }
        # Heuristic count of inter-switch uplinks (high-speed ports, port-channels,
        # ports with LLDP-discovered switch neighbors, or operator-tagged "uplink").
        uplinkCount: { type: integer, nullable: true }

    ApplianceMetricSample:
      type: object
      required: [time]
      properties:
        time: { type: string, format: date-time }
        cpuPct: { type: number, format: float, nullable: true }
        memUsedBytes: { type: integer, format: int64, nullable: true }
        memTotalBytes: { type: integer, format: int64, nullable: true }

    ApplianceMetricSeries:
      type: object
      required: [applianceId, range, capturedAtTo, samples]
      properties:
        applianceId: { type: string, format: uuid }
        range: { type: string }
        capturedAtTo: { type: string, format: date-time }
        samples:
          type: array
          items: { $ref: "#/components/schemas/ApplianceMetricSample" }

    ApplianceIfaceSample:
      type: object
      required: [time]
      properties:
        time: { type: string, format: date-time }
        inBps: { type: integer, format: int64, nullable: true }
        outBps: { type: integer, format: int64, nullable: true }
        inErrors: { type: integer, format: int64, nullable: true }
        outErrors: { type: integer, format: int64, nullable: true }
        inDiscards: { type: integer, format: int64, nullable: true }
        outDiscards: { type: integer, format: int64, nullable: true }

    ApplianceIfaceSeries:
      type: object
      required: [applianceId, ifIndex, range, capturedAtTo, samples]
      properties:
        applianceId: { type: string, format: uuid }
        ifIndex: { type: integer }
        range: { type: string }
        capturedAtTo: { type: string, format: date-time }
        samples:
          type: array
          items: { $ref: "#/components/schemas/ApplianceIfaceSample" }

    CreateApplianceRequest:
      type: object
      required: [siteId, name, mgmtIp]
      properties:
        siteId: { type: string, format: uuid }
        name: { type: string }
        vendor: { type: string, enum: [meraki, cisco, aruba, ubiquiti, mikrotik, generic], default: generic }
        model: { type: string }
        serial: { type: string }
        mgmtIp: { type: string, format: ipv4 }
        snmpVersion: { type: string, enum: [v1, v2c, v3], default: v2c }
        community: { type: string, format: password, description: "Required for v1/v2c" }
        v3User: { type: string, description: "Required for v3" }
        v3AuthProto: { type: string, enum: [SHA, SHA256, SHA512, MD5] }
        v3AuthPass: { type: string, format: password }
        v3PrivProto: { type: string, enum: ["", AES, AES256, DES] }
        v3PrivPass: { type: string, format: password }
        pollIntervalSeconds: { type: integer, minimum: 15, maximum: 3600, default: 60 }
        tags:
          type: array
          items: { type: string }

    EnrollmentToken:
      type: object
      required: [id, siteId, label, maxUses, usedCount, expiresAt, createdAt, isValid]
      properties:
        id: { type: string, format: uuid }
        siteId: { type: string, format: uuid }
        label: { type: string }
        maxUses: { type: integer }
        usedCount: { type: integer }
        expiresAt: { type: string, format: date-time }
        revokedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        isValid: { type: boolean }

    NewEnrollmentToken:
      type: object
      required: [id, siteId, label, token, expiresAt, maxUses, installCmd, installCmds]
      properties:
        id: { type: string, format: uuid }
        siteId: { type: string, format: uuid }
        label: { type: string }
        token:
          type: string
          description: "Plaintext bearer token. Returned once at creation; never persisted."
        expiresAt: { type: string, format: date-time }
        maxUses: { type: integer }
        installCmd:
          type: string
          description: "Linux install one-liner (kept for back-compat with old UIs). Same as installCmds.linux."
        installCmds:
          type: object
          required: [linux, windows]
          description: "Per-OS install one-liner. Pick the one that matches the target host."
          properties:
            linux:
              type: string
              description: "curl | sudo bash one-liner; installs sonar-probe as a systemd unit."
            windows:
              type: string
              description: "PowerShell one-liner (run elevated); installs sonar-probe.exe as the SonarProbe Windows service."

    CreateEnrollmentTokenRequest:
      type: object
      required: [siteId]
      properties:
        siteId: { type: string, format: uuid }
        label: { type: string }
        ttlHours: { type: integer, minimum: 1, maximum: 720, default: 24 }
        maxUses: { type: integer, minimum: 1, maximum: 100, default: 1 }

    AgentEnrollRequest:
      type: object
      required: [token, hostname, fingerprint]
      properties:
        token: { type: string, description: "Plaintext enrollment token issued by /agents/enrollment-tokens" }
        hostname: { type: string }
        fingerprint: { type: string }
        os: { type: string, default: linux }
        osVersion: { type: string }
        agentVersion: { type: string }

    AgentEnrollResponse:
      type: object
      required: [agentId, siteId, jwt, ingestWs]
      properties:
        agentId: { type: string, format: uuid }
        siteId: { type: string, format: uuid }
        jwt: { type: string, description: "Long-lived agent JWT used for /agent/ws connections." }
        ingestWs: { type: string, description: "wss:// URL the agent should connect to." }

  # ---- Reusable responses ----------------------------------------------
  responses:
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Authenticated but lacks the required role
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    BadRequest:
      description: Validation failure
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:
  /healthz:
    get:
      summary: Liveness/readiness probe
      security: []
      responses:
        "200":
          description: Service status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /version:
    get:
      summary: Build version metadata
      security: []
      responses:
        "200":
          description: Version
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VersionInfo" }

  /auth/login:
    post:
      summary: Exchange email/password (+optional TOTP) for tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Login OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/refresh:
    post:
      summary: Refresh an access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefreshRequest" }
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/me:
    get:
      summary: Current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /sites:
    get:
      summary: List sites visible to the caller
      responses:
        "200":
          description: Sites
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Site" }
    post:
      summary: Create a new site (superadmin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSiteRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Site" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /users:
    get:
      summary: List users (superadmin)
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/User" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      summary: Create a user (superadmin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateUserRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /agents:
    get:
      summary: List agents (filter by site)
      parameters:
        - in: query
          name: siteId
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Agents
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Agent" }

  /users/{id}:
    patch:
      summary: Update a user (superadmin)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateUserRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
    delete:
      summary: Permanently delete a user (superadmin)
      description: |
        Hard-deletes the user and cascade-removes their site memberships
        and API keys. Audit log entries created by the user are
        preserved (the actor_id becomes an orphan reference, intentional).
        Returns 400 with code `self_delete` when the caller targets their
        own account, and 400 with code `last_superadmin` when removing
        the user would leave zero active superadmins.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: Deleted }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /topology:
    get:
      summary: Network topology graph (managed appliances + LLDP/CDP neighbors)
      description: |
        Builds a deduped node/edge graph from every appliance's
        last_snapshot. Managed nodes are real Appliance rows; foreign
        nodes are devices we only learned about via a neighbor's CDP
        or LLDP advertisement (id is `foreign:<sysname>`). Edges are
        keyed by an unordered node-pair so a link reported by both
        ends collapses into one edge with `protocol: "both"`.
      parameters:
        - in: query
          name: siteId
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Topology
          content:
            application/json:
              schema:
                type: object
                properties:
                  generatedAt: { type: string, format: date-time }
                  nodes:
                    type: array
                    items:
                      type: object
                      properties:
                        id:        { type: string }
                        kind:      { type: string, enum: [appliance, foreign] }
                        name:      { type: string }
                        label:     { type: string }
                        vendor:    { type: string }
                        model:     { type: string }
                        platform:  { type: string }
                        mgmtIp:    { type: string }
                        siteId:    { type: string, format: uuid }
                        status:    { type: string, enum: [up, degraded, down, unknown] }
                        lastSeenAt:  { type: string, format: date-time }
                        portsTotal:  { type: integer }
                        portsUp:     { type: integer }
                        uplinkCount: { type: integer }
                  edges:
                    type: array
                    items:
                      type: object
                      properties:
                        from:      { type: string }
                        to:        { type: string }
                        fromPort:  { type: string }
                        toPort:    { type: string }
                        protocol:  { type: string, enum: [lldp, cdp, both] }
                        operUp:    { type: boolean }

  /appliances:
    get:
      summary: List appliances (filter by site)
      parameters:
        - in: query
          name: siteId
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Appliances
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Appliance" }
    post:
      summary: Create a new appliance (siteadmin+)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateApplianceRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Appliance" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /appliances/{id}:
    get:
      summary: Get a single appliance with its latest SNMP snapshot
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Appliance
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Appliance"
                  - type: object
                    properties:
                      sysDescr: { type: string, nullable: true }
                      lastSnapshotAt: { type: string, format: date-time, nullable: true }
                      lastSnapshot:
                        type: object
                        description: |
                          Verbatim SNMP snapshot the poller stored. Contains
                          system, chassis, interfaces[], entities[] and lldp[]
                          arrays — see internal/snmp/snapshot.go for the full
                          schema.
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      summary: Remove an appliance (siteadmin+)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }

  /appliances/{id}/metrics:
    get:
      summary: Time-series chassis CPU/memory samples for sparklines
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: range
          schema: { type: string, default: "24h", description: "Go duration; '<N>d' shorthand for days; max 30d" }
      responses:
        "200":
          description: Series
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApplianceMetricSeries" }

  /appliances/{id}/interfaces/{ifIndex}/metrics:
    get:
      summary: Time-series per-port bps + error/discard deltas
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: ifIndex
          required: true
          schema: { type: integer }
        - in: query
          name: range
          schema: { type: string, default: "24h" }
      responses:
        "200":
          description: Series
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApplianceIfaceSeries" }

  /agents/{id}:
    get:
      summary: Get a single agent with its latest snapshot
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Agent
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Agent"
                  - type: object
                    properties:
                      lastMetrics:
                        type: object
                        description: |
                          Verbatim last snapshot the probe sent (Snapshot v2). Includes
                          a `conversations` array of aggregated active TCP/UDP peer
                          pairs (direction, remoteIp, remoteHost, remotePort, localPort,
                          state, pid, processName, count) for the "talking to" view.
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      summary: Remove an agent (siteadmin+)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }

  /agents/{id}/metrics:
    get:
      summary: Time-series metric samples for sparklines
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: range
          schema: { type: string, default: "24h", description: "Go duration; '<N>d' shorthand for days; max 30d" }
      responses:
        "200":
          description: Samples
          content:
            application/json:
              schema:
                type: object
                properties:
                  agentId: { type: string, format: uuid }
                  range:   { type: string }
                  samples:
                    type: array
                    items:
                      type: object
                      properties:
                        time:               { type: string, format: date-time }
                        cpuPct:             { type: number, nullable: true }
                        memUsedBytes:       { type: integer, nullable: true }
                        memTotalBytes:      { type: integer, nullable: true }
                        rootDiskUsedBytes:  { type: integer, nullable: true }
                        rootDiskTotalBytes: { type: integer, nullable: true }

  /agents/enrollment-tokens:
    get:
      summary: List outstanding enrollment tokens (siteadmin+)
      responses:
        "200":
          description: Tokens
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/EnrollmentToken" }
    post:
      summary: Issue a new enrollment token (siteadmin+)
      description: |
        Returns a plaintext token in the response — capture it
        immediately, the API only stores its sha256 hash.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateEnrollmentTokenRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NewEnrollmentToken" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /agents/enrollment-tokens/{id}:
    delete:
      summary: Revoke an enrollment token (siteadmin+)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: Revoked }
        "404": { $ref: "#/components/responses/NotFound" }

  /agents/enroll:
    post:
      summary: Enroll an agent using a one-time token (unauthenticated)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AgentEnrollRequest" }
      responses:
        "201":
          description: Enrolled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentEnrollResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /probe/install.sh:
    get:
      summary: Probe install one-liner (Linux bash; unauthenticated)
      security: []
      responses:
        "200":
          description: install script
          content:
            text/x-shellscript:
              schema: { type: string }

  /probe/install.ps1:
    get:
      summary: Probe install one-liner (Windows PowerShell; unauthenticated)
      security: []
      responses:
        "200":
          description: PowerShell install script
          content:
            text/plain:
              schema: { type: string }

  /probe/download/{os}/{arch}:
    get:
      summary: Download a probe binary (unauthenticated)
      security: []
      parameters:
        - in: path
          name: os
          required: true
          schema: { type: string, enum: [linux, windows] }
        - in: path
          name: arch
          required: true
          schema: { type: string, enum: [amd64, arm64] }
      responses:
        "200":
          description: binary
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        "404": { $ref: "#/components/responses/NotFound" }
